services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payroll_manager
    ports:
      - "5432:5432"
    volumes:
      - payroll_pgdata:/var/lib/postgresql/data

volumes:
  payroll_pgdata:
